schema_version: 0.1

paper:
  id: paper.hutchcroft_2022_transience_anchored_isoperimetric_dimension
  type: Paper
  title: "Transience and anchored isoperimetric dimension of supercritical percolation clusters"
  authors:
    - Tom Hutchcroft
  year: 2022
  source:
    arxiv_id: "2207.05226v1"
    local_file: "2207.05226v1.pdf"
    arxiv_category: "math.PR"
    date: "2022-07-11"
    pdf_lines_observed:
      abstract: "1-14"
      theorem_1_1: "98-127"
      corollary_1_6: "203-211"
      proof_overview: "219-227"
      open_question: "819-831"
  abstract_summary: >
    Establishes several equivalent characterisations of the anchored
    isoperimetric dimension of supercritical Bernoulli percolation clusters
    on transitive graphs. Combining these characterisations with a theorem of
    Duminil-Copin, Goswami, Raoufi, Severo, and Yadin yields that if G is a
    transient transitive graph, then for p sufficiently close to 1, every
    infinite Bernoulli-p cluster is transient almost surely.
  problem_context: >
    The book develops transience through effective conductance, isoperimetry,
    and percolation on transitive graphs. This paper asks whether the random
    walk behaviour of a transitive graph survives supercritical percolation,
    especially whether transience of G implies transience of its infinite
    clusters.
  delta_from_book: >
    Adds a post-book result connecting anchored isoperimetric dimension of
    supercritical clusters to finite-cluster tail bounds and boundary
    connection estimates. It gives a perturbative positive answer to the
    Benjamini-Lyons-Schramm conjecture that transient transitive graphs have
    transient infinite percolation clusters.
  main_contributions:
    - Characterises anchored isoperimetric dimension of supercritical clusters by four equivalent conditions.
    - Introduces simple sprinkled cluster repulsion inequalities.
    - Converts finite-cluster tail estimates into anchored isoperimetric inequalities.
    - Deduces transience of infinite clusters for p sufficiently close to 1 on transient transitive graphs.
  book_anchors:
    - section.lp.ch02.s05_transience_recurrence
    - thm.lp.transience_effective_conductance
    - section.lp.ch06.isoperimetric_inequalities
    - section.lp.ch06.anchored_expansion_and_percolation
    - section.lp.ch07.percolation_on_transitive_graphs
    - section.lp.ch08.mass_transport_technique_and_percolation
  extracted_nodes:
